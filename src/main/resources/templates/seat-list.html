<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>티켓 예매 현황판</title>
    <style>
        .container { padding: 20px; }
        .seat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 600px; }
        .seat-card {
            border: 1px solid #ccc; padding: 15px; text-align: center; border-radius: 8px;
            background-color: #f9f9f9;
        }
        /* 상태별 색상 지정 */
        .status-AVAILABLE { background-color: #e0ffd4; border-color: #4caf50; } /* 초록 */
        .status-HELD { background-color: #fff4d4; border-color: #ff9800; }      /* 주황 */
        .status-CONFIRMED { background-color: #e0e0e0; border-color: #616161; color: #555; } /* 회색 */
    </style>
</head>
<script>
const idempotencyKey = crypto.randomUUID();

// 예약 요청 (Hold)
function holdSeat(seatId) {
    const command = { seatId: seatId, userId: 999 }; // 테스트용 유저 ID

    fetch('/api/reservations', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Idempotency-Key': idempotencyKey
        },
        body: JSON.stringify(command)
    })
        .then(handleResponse);
}

// 예약 확정 (Confirm)
function confirmReservation(reservationId) {

    fetch(`/api/reservations/${reservationId}/confirm`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Idempotency-Key': idempotencyKey
        }
    })
    .then(handleResponse);
}

// 예약 취소 (Cancel)
function cancelReservation(reservationId) {

    fetch(`/api/reservations/${reservationId}/cancel`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Idempotency-Key': idempotencyKey
        }
    })
    .then(handleResponse);
}

// 공통 응답 처리
function handleResponse(response) {
    if (response.ok) {
        alert('처리되었습니다.');
        window.location.reload();
    } else {
        response.text().then(msg => alert('실패: ' + msg));
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const seats = document.querySelectorAll('.seat-card');

    seats.forEach(seat => {
        seat.addEventListener('click', function() {
            const seatId = this.dataset.id;
            // HTML에 th:data-reservation-id 속성이 추가되어야 함 (아래 HTML 수정 참고)
            const reservationId = this.dataset.reservationId;
            const status = this.querySelector('p').innerText;
            const seatNo = this.querySelector('h3').innerText;

            if (status === 'AVAILABLE') {
                if (confirm(seatNo + ' 좌석을 예약(Hold) 하시겠습니까?')) {
                    holdSeat(seatId);
                }
            }else if (status === 'HELD') {
                if (confirm(seatNo + ' 예약을 확정(Confirm) 하시겠습니까?')) {
                    confirmReservation(reservationId);
                }
            } else if (status === 'CONFIRMED') { // [추가된 부분]
                if (confirm(seatNo + ' 예약을 정말 취소(Cancel) 하시겠습니까?')) {
                    cancelReservation(reservationId);
                }
            } else {
                alert('이미 확정된 좌석입니다.');
            }
        });
    });
});
</script>
<body>
<div class="container">
    <h1>🎟️ 좌석 예매 현황</h1>
    <div class="seat-grid">
        <div th:each="seat : ${seats}"
            class="seat-card"
            th:classappend="'status-' + ${seat.status}"
             th:attr="data-id=${seat.seatId}, data-reservation-id=${seat.reservationId}">

            <h3 th:text="${seat.seatCode}">A-1</h3>
            <p th:text="${seat.status}">AVAILABLE</p>

            <div th:if="${seat.reservationId != null}">
                <small th:text="'User: ' + ${seat.userId}">User: 1</small>
            </div>
        </div>
    </div>
</div>
</body>
</html>
